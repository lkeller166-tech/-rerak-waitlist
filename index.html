<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reRak</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:   #4A0F1F;
    --blush: #FDE6EE;
    --neon:  #DEFFAF;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--red);
    color: var(--blush);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }

  .container {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .wordmark {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 2.25rem;
    color: var(--blush);
    display: block;
    margin-bottom: 0.6rem;
    letter-spacing: -0.05em;
  }

  .coming-soon {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(253, 230, 238, 0.5);
    display: block;
    margin-bottom: 2.25rem;
  }

  h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(1.9rem, 5vw, 2.5rem);
    font-weight: 600;
    line-height: 1.15;
    color: var(--blush);
    letter-spacing: -0.025em;
    margin-bottom: 1rem;
  }

  .subhead {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.7;
    color: var(--blush);
    opacity: 0.5;
    margin-bottom: 2rem;
    letter-spacing: 0.01em;
  }

  .form-row {
    display: flex;
    gap: 0.5rem;
    width: 100%;
  }

  input[type="email"] {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(253, 230, 238, 0.22);
    border-radius: 0;
    padding: 0.75rem 0.25rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--blush);
    outline: none;
    transition: border-color 0.25s;
  }

  input[type="email"]::placeholder {
    color: rgba(253, 230, 238, 0.28);
    font-size: 0.82rem;
    letter-spacing: 0.03em;
  }

  input[type="email"]:focus {
    border-bottom-color: rgba(253, 230, 238, 0.55);
  }

  button {
    background: transparent;
    color: var(--neon);
    border: none;
    border-bottom: 1px solid rgba(222, 255, 175, 0.3);
    border-radius: 0;
    padding: 0.75rem 0.25rem 0.75rem 1.25rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.65; }
  button:active { opacity: 0.45; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .message {
    margin-top: 1.25rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    min-height: 1.2em;
    color: var(--neon);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .message.visible { opacity: 0.7; }
  .message.error { color: var(--blush); opacity: 0.45; }

  .footer {
    margin-top: 3rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--blush);
    opacity: 0.2;
  }

  .consent {
    margin-top: 0.75rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--blush);
    opacity: 0.2;
  }

  @media (max-width: 480px) {
    .form-row { flex-direction: column; gap: 1.25rem; }
    button { padding: 0.75rem 0; text-align: left; }
  }
</style>
<script async src="https://tally.so/widgets/embed.js"></script>
</head>
<body>

<div class="container">

  <span class="wordmark">reRak</span>
  <span class="coming-soon">Coming soon</span>

  <h1>Your fitness class, reRak'd.</h1>

  <p class="subhead">Never waste a class credit. Find last minute spots near you.</p>

  <iframe data-tally-src="https://tally.so/embed/pbZPbJ?alignLeft=1&hideTitle=1&transparentBackground=1" loading="lazy" width="100%" height="169" frameborder="0" marginheight="0" marginwidth="0" title="RERAK"></iframe>

  <p class="message" id="msg"></p>

  <p class="footer">NYC only (for now)</p>
  <p class="consent">By submitting you agree to receive updates from reRak.</p>

</div>

<script>
  async function submitEmail() {
    const input = document.getElementById('email-input');
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('msg');
    const email = input.value.trim();

    msg.className = 'message';
    msg.textContent = '';

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      msg.textContent = 'a valid email, please.';
      msg.className = 'message visible error';
      return;
    }

    btn.disabled = true;
    btn.textContent = '...';

    try {
      const res = await fetch('https://tally.so/r/pbZPbJ', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `answers[0][value]=${encodeURIComponent(email)}`
      });

      input.value = '';
      msg.textContent = "noted. you'll hear from us.";
      msg.className = 'message visible';
      btn.textContent = '✓';

    } catch (e) {
      msg.textContent = 'something went wrong. try again.';
      msg.className = 'message visible error';
      btn.disabled = false;
      btn.textContent = 'Notify me';
    }
  }

  document.getElementById('email-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitEmail();
  });
</script>

</body>
</html>
