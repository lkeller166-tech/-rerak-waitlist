<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reRak</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script async src="https://tally.so/widgets/embed.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:   #4A0F1F;
    --blush: #FDE6EE;
    --neon:  #DEFFAF;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--red);
    color: var(--blush);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }

  .container {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .wordmark {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 2.25rem;
    color: var(--blush);
    display: block;
    margin-bottom: 0.6rem;
    letter-spacing: -0.05em;
  }

  .coming-soon {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(253, 230, 238, 0.5);
    display: block;
    margin-bottom: 2.25rem;
  }

  h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(1.9rem, 5vw, 2.5rem);
    font-weight: 600;
    line-height: 1.15;
    color: var(--blush);
    letter-spacing: -0.025em;
    margin-bottom: 1rem;
  }

  .subhead {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.7;
    color: var(--blush);
    opacity: 0.5;
    margin-bottom: 2rem;
    letter-spacing: 0.01em;
  }

  .tally-wrap {
    width: 100%;
    margin-bottom: 1rem;
  }

  .footer {
    margin-top: 2rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--blush);
    opacity: 0.2;
  }

  .consent {
    margin-top: 0.75rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--blush);
    opacity: 0.2;
  }
</style>
</head>
<body>

<div class="container">

  <span class="wordmark">reRak</span>
  <span class="coming-soon">Coming soon</span>

  <h1>Your fitness class, reRak'd.</h1>

  <p class="subhead">Never waste a class credit. Find last minute spots near you.</p>

  <div class="tally-wrap">
    <iframe
      data-tally-src="https://tally.so/r/pbZPbJ?transparentBackground=1"
      loading="lazy"
      width="100%"
      height="120"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      title="reRak waitlist"
    ></iframe>
  </div>

  <p class="footer">NYC only (for now)</p>
  <p class="consent">By submitting you agree to receive updates from reRak.</p>

</div>

</body>
</html>
